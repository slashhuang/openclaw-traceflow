version: '3.8'

services:
  openclaw-monitor:
    build: .
    # 或者使用预构建镜像
    # image: clawfamily/openclaw-monitor:latest
    container_name: openclaw-monitor
    ports:
      - "3001:3001"
    volumes:
      # 持久化数据
      - openclaw-monitor-data:/app/data
      # 挂载配置文件（可选）
      - ./config:/app/config:ro
    environment:
      # OpenClaw Gateway 地址（根据实际情况修改）
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:3000
      # 访问令牌（可选，启用后需要 Bearer Token）
      # - OPENCLAW_RUNTIME_ACCESS_TOKEN=your-secret-token
      # 访问模式：local-only | token | none
      # - OPENCLAW_ACCESS_MODE=local-only
      # 数据目录
      # - DATA_DIR=/app/data
      # PM2 日志路径（需要挂载宿主机的 PM2 日志）
      # - PM2_LOG_PATH=/root/.pm2/logs/openclaw-gateway-out.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# 持久化卷
volumes:
  openclaw-monitor-data:
