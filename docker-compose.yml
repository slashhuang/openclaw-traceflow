# Monorepo 根目录便捷入口：构建上下文与镜像定义在 openclaw-traceflow/
# 等价于：cd openclaw-traceflow && docker compose up -d
services:
  openclaw-traceflow:
    build: ./openclaw-traceflow
    # image: clawfamily/openclaw-traceflow:latest
    container_name: openclaw-traceflow
    ports:
      - "3001:3001"
    volumes:
      - openclaw-traceflow-data:/app/data
      - ./openclaw-traceflow/config:/app/config:ro
    environment:
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:3000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openclaw-traceflow-data:
