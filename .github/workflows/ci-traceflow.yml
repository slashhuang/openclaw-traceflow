name: CI - TraceFlow

on:
  push:
    branches: [main]
    paths:
      - 'openclaw-traceflow/**'
  pull_request:
    branches: [main]
    paths:
      - 'openclaw-traceflow/**'

jobs:
  lint:
    name: Lint (TraceFlow)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./openclaw-traceflow
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies (root)
        run: pnpm install

      - name: Install dependencies (frontend)
        run: cd frontend && pnpm install

      - name: Run lint (backend)
        run: pnpm run lint

      - name: Run lint (frontend)
        run: pnpm run lint:frontend

  build:
    name: Build (TraceFlow)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./openclaw-traceflow
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies (root)
        run: pnpm install

      - name: Install dependencies (frontend)
        run: cd frontend && pnpm install

      - name: Build backend
        run: pnpm run build

      - name: Build frontend
        run: pnpm run build:frontend

  test:
    name: Test (TraceFlow)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./openclaw-traceflow
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies (root)
        run: pnpm install

      - name: Install dependencies (frontend)
        run: cd frontend && pnpm install

      - name: Run tests
        run: pnpm run test --passWithNoTests
