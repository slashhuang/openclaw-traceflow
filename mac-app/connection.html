<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿布控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 25%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* 背景粒子动画 */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-particles span {
      position: absolute;
      display: block;
      width: 4px;
      height: 4px;
      background: rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: floatUp 15s linear infinite;
    }

    .bg-particles span:nth-child(1) { left: 10%; width: 6px; height: 6px; animation-duration: 12s; animation-delay: 0s; }
    .bg-particles span:nth-child(2) { left: 20%; width: 4px; height: 4px; animation-duration: 18s; animation-delay: 2s; }
    .bg-particles span:nth-child(3) { left: 30%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 4s; }
    .bg-particles span:nth-child(4) { left: 40%; width: 3px; height: 3px; animation-duration: 20s; animation-delay: 1s; }
    .bg-particles span:nth-child(5) { left: 50%; width: 6px; height: 6px; animation-duration: 14s; animation-delay: 3s; }
    .bg-particles span:nth-child(6) { left: 60%; width: 4px; height: 4px; animation-duration: 16s; animation-delay: 5s; }
    .bg-particles span:nth-child(7) { left: 70%; width: 5px; height: 5px; animation-duration: 13s; animation-delay: 2s; }
    .bg-particles span:nth-child(8) { left: 80%; width: 3px; height: 3px; animation-duration: 19s; animation-delay: 4s; }
    .bg-particles span:nth-child(9) { left: 90%; width: 6px; height: 6px; animation-duration: 17s; animation-delay: 1s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
      z-index: 1;
    }

    .logo-section {
      margin-bottom: 32px;
    }

    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(79, 195, 247, 0.5);
      box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2);
      animation: avatarFloat 3s ease-in-out infinite, avatarGlow 2s ease-in-out infinite alternate;
    }

    .avatar-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      border: 2px solid rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .avatar-ring:nth-child(2) {
      width: 220px;
      height: 220px;
      animation-delay: 1s;
    }

    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes avatarGlow {
      0% { box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2); }
      100% { box-shadow: 0 10px 60px rgba(79, 195, 247, 0.6), inset 0 0 30px rgba(79, 195, 247, 0.4); }
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff 0%, #a8edea 50%, #4fc3f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 24px;
      padding: 36px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: cardEnter 0.6s ease-out;
    }

    @keyframes cardEnter {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 13px;
      margin-bottom: 24px;
      background: rgba(79, 195, 247, 0.12);
      border: 1px solid rgba(79, 195, 247, 0.3);
      color: #4fc3f7;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4fc3f7;
      box-shadow: 0 0 15px #4fc3f7;
      animation: dotPulse 2s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.15); }
    }

    .info-box {
      text-align: left;
      padding: 18px;
      background: rgba(79, 195, 247, 0.08);
      border-radius: 14px;
      margin-bottom: 24px;
      border: 1px solid rgba(79, 195, 247, 0.15);
    }

    .info-box p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.7;
    }

    .info-box code {
      display: inline-block;
      margin-top: 8px;
      background: rgba(79, 195, 247, 0.15);
      color: #4fc3f7;
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      border: 1px solid rgba(79, 195, 247, 0.2);
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      transition: all 0.3s ease;
      outline: none;
      font-family: 'SF Mono', Monaco, monospace;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 195, 247, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(79, 195, 247, 0.2);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn {
      width: 100%;
      padding: 18px 28px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4fc3f7 0%, #42a5f5 100%);
      color: #fff;
      box-shadow: 0 6px 25px rgba(79, 195, 247, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(79, 195, 247, 0.5);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: linear-gradient(135deg, rgba(79, 195, 247, 0.5) 0%, rgba(66, 165, 245, 0.5) 100%);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .message {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 14px;
      font-size: 13px;
      display: none;
      text-align: left;
      line-height: 1.6;
      animation: messageSlide 0.3s ease-out;
    }

    @keyframes messageSlide {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .message.error {
      display: block;
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.3);
      color: #e57373;
    }

    .message.success {
      display: block;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #81c784;
    }

    .loading {
      display: none;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 8px;
    }

    .contact-link {
      display: inline-block;
      margin-top: 8px;
      color: #4fc3f7;
      text-decoration: none;
      font-size: 13px;
    }

    .contact-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="bg-particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="logo-section">
      <div class="avatar-container">
        <div class="avatar-ring"></div>
        <div class="avatar-ring"></div>
        <img src="abu.jpg" alt="阿布" class="avatar" onerror="this.style.display='none'">
      </div>
      <h1>阿布控制台</h1>
      <p class="subtitle">连接 OpenClaw ControlUI</p>
    </div>

    <div class="card">
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span>正在连接...</span>
      </div>

      <div class="info-box">
        <p>📍 本地服务地址</p>
        <code>http://127.0.0.1:18789/</code>
      </div>

      <div class="input-group">
        <label for="gatewayToken">🔑 Gateway Token</label>
        <input
          type="text"
          id="gatewayToken"
          placeholder="Gateway Token"
          value=""
          autocomplete="off"
        >
        <p class="hint">Token 用于连接 ControlUI 网关</p>
      </div>

      <button class="btn btn-primary" id="connectBtn" style="display:none;">
        <span>连接并打开控制台</span>
        <div class="loading" id="loadingSpinner"></div>
      </button>

      <div class="message" id="message"></div>
    </div>
  </div>

  <script>
    const DEFAULT_CONTROL_URL = 'http://127.0.0.1:18789/';
    const CONTACT_DAD = '遇到问题请联系爸爸';

    async function loadConfig() {
      const config = await window.electronAPI.getConfig();
      const token = await window.electronAPI.getGatewayToken();
      if (token) {
        document.getElementById('gatewayToken').value = token;
      }
      // 自动尝试连接
      checkAndConnect();
    }

    async function checkAndConnect() {
      const btn = document.getElementById('connectBtn');
      const loading = document.getElementById('loadingSpinner');
      const message = document.getElementById('message');
      const statusBadge = document.getElementById('statusBadge');
      const tokenInput = document.getElementById('gatewayToken');

      message.className = 'message';
      message.textContent = '';

      try {
        const result = await window.electronAPI.checkControlUI(DEFAULT_CONTROL_URL);

        if (result.ok) {
          statusBadge.innerHTML = '<span class="status-dot" style="background:#4caf50;box-shadow:0 0 15px #4caf50;"></span><span style="color:#4caf50;">已连接</span>';

          message.className = 'message success';
          message.textContent = '✨ 连接成功！正在打开 ControlUI...';

          const config = await window.electronAPI.getConfig();
          config.controlUrl = DEFAULT_CONTROL_URL;
          await window.electronAPI.setConfig(config);

          setTimeout(() => {
            window.electronAPI.openMainWindow(DEFAULT_CONTROL_URL);
          }, 800);
          return;
        }
      } catch (err) {
        // 继续往下执行，尝试启动 OpenClaw
      }

      // ControlUI 未运行，尝试启动
      statusBadge.innerHTML = '<span class="status-dot" style="background:#ffa726;box-shadow:0 0 15px #ffa726;"></span><span style="color:#ffa726;">正在启动 OpenClaw...</span>';
      message.className = 'message';
      message.textContent = '🚀 检测到 OpenClaw 未运行，正在启动...';

      try {
        await window.electronAPI.startOpenclaw();

        // 等待网关启动
        statusBadge.innerHTML = '<span class="status-dot" style="background:#4caf50;box-shadow:0 0 15px #4caf50;"></span><span style="color:#4caf50;">启动成功！</span>';
        message.className = 'message success';
        message.textContent = '✨ OpenClaw 已启动！正在连接控制台...';

        // 等待片刻后连接
        setTimeout(async () => {
          const config = await window.electronAPI.getConfig();
          config.controlUrl = DEFAULT_CONTROL_URL;
          await window.electronAPI.setConfig(config);
          window.electronAPI.openMainWindow(DEFAULT_CONTROL_URL);
        }, 3000);
      } catch (err) {
        statusBadge.innerHTML = '<span class="status-dot" style="background:#f44336;box-shadow:0 0 15px #f44336;"></span><span style="color:#e57373;">启动失败</span>';
        message.className = 'message error';
        message.innerHTML = `无法启动 OpenClaw<br><br>❌ ${err.message}<br><br>${CONTACT_DAD}`;
      }
    }

    document.getElementById('connectBtn').addEventListener('click', checkAndConnect);

    loadConfig();
  </script>
</body>
</html>
