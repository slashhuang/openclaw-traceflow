<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿布控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 25%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* 背景粒子动画 */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-particles span {
      position: absolute;
      display: block;
      width: 4px;
      height: 4px;
      background: rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: floatUp 15s linear infinite;
    }

    .bg-particles span:nth-child(1) { left: 10%; width: 6px; height: 6px; animation-duration: 12s; animation-delay: 0s; }
    .bg-particles span:nth-child(2) { left: 20%; width: 4px; height: 4px; animation-duration: 18s; animation-delay: 2s; }
    .bg-particles span:nth-child(3) { left: 30%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 4s; }
    .bg-particles span:nth-child(4) { left: 40%; width: 3px; height: 3px; animation-duration: 20s; animation-delay: 1s; }
    .bg-particles span:nth-child(5) { left: 50%; width: 6px; height: 6px; animation-duration: 14s; animation-delay: 3s; }
    .bg-particles span:nth-child(6) { left: 60%; width: 4px; height: 4px; animation-duration: 16s; animation-delay: 5s; }
    .bg-particles span:nth-child(7) { left: 70%; width: 5px; height: 5px; animation-duration: 13s; animation-delay: 2s; }
    .bg-particles span:nth-child(8) { left: 80%; width: 3px; height: 3px; animation-duration: 19s; animation-delay: 4s; }
    .bg-particles span:nth-child(9) { left: 90%; width: 6px; height: 6px; animation-duration: 17s; animation-delay: 1s; }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) scale(1);
        opacity: 0;
      }
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
      z-index: 1;
    }

    .logo-section {
      margin-bottom: 32px;
    }

    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(79, 195, 247, 0.5);
      box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2);
      animation: avatarFloat 3s ease-in-out infinite, avatarGlow 2s ease-in-out infinite alternate;
    }

    .avatar-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      border: 2px solid rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .avatar-ring:nth-child(2) {
      width: 220px;
      height: 220px;
      animation-delay: 1s;
    }

    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes avatarGlow {
      0% { box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2); }
      100% { box-shadow: 0 10px 60px rgba(79, 195, 247, 0.6), inset 0 0 30px rgba(79, 195, 247, 0.4); }
    }

    @keyframes ringPulse {
      0%, 100% {
        opacity: 0.3;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1.05);
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff 0%, #a8edea 50%, #4fc3f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 24px;
      padding: 36px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: cardEnter 0.6s ease-out;
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card.hidden { display: none; }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      transition: all 0.3s ease;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 195, 247, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(79, 195, 247, 0.2);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn {
      width: 100%;
      padding: 18px 28px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4fc3f7 0%, #42a5f5 100%);
      color: #fff;
      box-shadow: 0 6px 25px rgba(79, 195, 247, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(79, 195, 247, 0.5);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: linear-gradient(135deg, rgba(79, 195, 247, 0.5) 0%, rgba(66, 165, 245, 0.5) 100%);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .start-section {
      text-align: center;
    }

    .repo-info {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 28px;
      word-break: break-all;
      padding: 16px;
      background: rgba(79, 195, 247, 0.08);
      border-radius: 12px;
      border: 1px solid rgba(79, 195, 247, 0.15);
      line-height: 1.6;
    }

    .status {
      margin-top: 24px;
      padding: 18px 22px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
      animation: statusSlideIn 0.4s ease-out;
    }

    @keyframes statusSlideIn {
      0% {
        opacity: 0;
        transform: translateY(-10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status.show {
      display: block;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #81c784;
    }

    .error {
      margin-top: 24px;
      padding: 18px 22px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
      animation: errorShake 0.5s ease-out;
    }

    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .error.show {
      display: block;
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.3);
      color: #e57373;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .welcome-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 28px;
      line-height: 1.7;
    }

    .feature-list {
      text-align: left;
      margin-top: 20px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .feature-item:last-child {
      margin-bottom: 0;
    }

    .feature-icon {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="bg-particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="logo-section">
      <div class="avatar-container">
        <div class="avatar-ring"></div>
        <div class="avatar-ring"></div>
        <img src="abu.jpg" alt="阿布" class="avatar" onerror="this.style.display='none'">
      </div>
      <h1>阿布控制台</h1>
      <p class="subtitle">让 AI 助手帮你自动化工作流</p>
    </div>

    <div class="card" id="pathSection">
      <p style="color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px; line-height: 1.7;">
        👋 欢迎使用阿布！<br>
        请先选择项目目录，然后一键启动。
      </p>

      <div class="input-group">
        <label for="path">📁 项目路径</label>
        <input type="text" id="path" placeholder="/Users/xxx/claw-sources/claw-family" readonly />
      </div>

      <button class="btn btn-primary" id="selectPathBtn">
        📂 选择目录
      </button>

      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">✅</span>
          <span>自动检测 bootstrap.sh</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🚀</span>
          <span>一键启动 OpenClaw 网关</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">💬</span>
          <span>飞书机器人自动响应</span>
        </div>
      </div>

      <p class="welcome-text">
        目录需包含 <code style="background: rgba(79,195,247,0.2); color: #4fc3f7; padding: 2px 6px; border-radius: 4px; font-size: 11px;">bootstrap.sh</code> 启动脚本
      </p>
    </div>

    <div class="card start-section hidden" id="startSection">
      <p class="repo-info" id="repoInfo"></p>
      <button class="btn btn-primary" id="startBtn">
        🚀 一键启动阿布
      </button>
    </div>

    <div class="status" id="status"></div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const pathSection = document.getElementById('pathSection');
    const startSection = document.getElementById('startSection');
    const pathInput = document.getElementById('path');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const startBtn = document.getElementById('startBtn');

    // 启动时检查已有配置
    ipcRenderer.invoke('get-repo-path').then(p => {
      if (p) {
        pathInput.value = p;
        showStartSection(p);
      }
    });

    document.getElementById('selectPathBtn').onclick = async () => {
      const repoPath = await ipcRenderer.invoke('select-directory');
      if (repoPath) {
        pathInput.value = repoPath;
        await ipcRenderer.invoke('set-repo-path', repoPath);
        showStartSection(repoPath);
      }
    };

    document.getElementById('startBtn').onclick = async () => {
      const repoPath = pathInput.value.trim();
      if (!repoPath) { alert('项目路径无效'); return; }

      startBtn.disabled = true;
      startBtn.innerHTML = '<span class="loading-spinner"></span> 正在启动...';
      pathSection.classList.add('hidden');
      startSection.classList.add('hidden');
      statusEl.classList.add('show');
      statusEl.textContent = '🚀 正在启动阿布…';

      try {
        await ipcRenderer.invoke('run-bootstrap', repoPath);
        statusEl.textContent = '📡 正在连接控制台…';
        await ipcRenderer.invoke('wait-for-gateway');
        statusEl.textContent = '✨ 启动成功！正在打开控制台…';
        setTimeout(() => {
          ipcRenderer.invoke('open-main-window');
        }, 800);
      } catch (err) {
        statusEl.style.display = 'none';
        errorEl.classList.add('show');
        errorEl.textContent = '启动失败：' + (err.message || String(err));
        startBtn.disabled = false;
        startBtn.innerHTML = '🚀 重试启动';
        pathSection.classList.remove('hidden');
      }
    };

    function showStartSection(path) {
      pathSection.classList.add('hidden');
      startSection.classList.remove('hidden');
      document.getElementById('repoInfo').innerHTML = '📂 已选择项目：<br><span style="color: rgba(255,255,255,0.7);">' + path + '</span>';
    }
  </script>
</body>
</html>
