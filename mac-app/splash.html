<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿布控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 25%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    /* 背景粒子动画 */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-particles span {
      position: absolute;
      display: block;
      width: 4px;
      height: 4px;
      background: rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: floatUp 15s linear infinite;
    }

    .bg-particles span:nth-child(1) { left: 10%; width: 6px; height: 6px; animation-duration: 12s; animation-delay: 0s; }
    .bg-particles span:nth-child(2) { left: 20%; width: 4px; height: 4px; animation-duration: 18s; animation-delay: 2s; }
    .bg-particles span:nth-child(3) { left: 30%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 4s; }
    .bg-particles span:nth-child(4) { left: 40%; width: 3px; height: 3px; animation-duration: 20s; animation-delay: 1s; }
    .bg-particles span:nth-child(5) { left: 50%; width: 6px; height: 6px; animation-duration: 14s; animation-delay: 3s; }
    .bg-particles span:nth-child(6) { left: 60%; width: 4px; height: 4px; animation-duration: 16s; animation-delay: 5s; }
    .bg-particles span:nth-child(7) { left: 70%; width: 5px; height: 5px; animation-duration: 13s; animation-delay: 2s; }
    .bg-particles span:nth-child(8) { left: 80%; width: 3px; height: 3px; animation-duration: 19s; animation-delay: 4s; }
    .bg-particles span:nth-child(9) { left: 90%; width: 6px; height: 6px; animation-duration: 17s; animation-delay: 1s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .container {
      text-align: center;
      padding: 40px;
      z-index: 1;
    }

    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(79, 195, 247, 0.5);
      box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2);
      animation: avatarFloat 3s ease-in-out infinite, avatarGlow 2s ease-in-out infinite alternate;
    }

    .avatar-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      border: 2px solid rgba(79, 195, 247, 0.3);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .avatar-ring:nth-child(2) {
      width: 200px;
      height: 200px;
      animation-delay: 1s;
    }

    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes avatarGlow {
      0% { box-shadow: 0 10px 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(79, 195, 247, 0.2); }
      100% { box-shadow: 0 10px 60px rgba(79, 195, 247, 0.6), inset 0 0 30px rgba(79, 195, 247, 0.4); }
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #fff 0%, #a8edea 50%, #4fc3f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .status {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      min-height: 22px;
      font-weight: 400;
    }

    .loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .loading-bar {
      width: 200px;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .loading-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #4fc3f7, #42a5f5, #4fc3f7);
      background-size: 200% 100%;
      border-radius: 3px;
      animation: loadingMove 1.5s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(79, 195, 247, 0.5);
    }

    @keyframes loadingMove {
      0% { left: -30%; }
      50% { left: 100%; }
      100% { left: -30%; }
    }

    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: rgba(79, 195, 247, 0.6);
      border-radius: 50%;
      animation: dotBounce 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 15px rgba(79, 195, 247, 0.6);
      }
    }

    .error {
      margin-top: 24px;
      padding: 14px 22px;
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 12px;
      color: #e57373;
      font-size: 13px;
      display: none;
      max-width: 300px;
      animation: errorShake 0.5s ease-out;
    }

    .error.show {
      display: block;
    }

    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .success-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(76, 175, 80, 0.1));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: successPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border: 3px solid rgba(76, 175, 80, 0.4);
      box-shadow: 0 10px 40px rgba(76, 175, 80, 0.3);
    }

    @keyframes successPop {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .success-text {
      color: #81c784;
      font-size: 16px;
      font-weight: 600;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="bg-particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="avatar-container">
      <div class="avatar-ring"></div>
      <div class="avatar-ring"></div>
      <img src="abu.jpg" alt="阿布" class="avatar" onerror="this.style.display='none'">
    </div>
    <h1>阿布控制台</h1>
    <p class="status" id="status">正在启动…</p>

    <div class="loading-container" id="loadingContainer">
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <p class="error" id="error"></p>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const loadingContainer = document.getElementById('loadingContainer');
    const statusEl = document.getElementById('status');

    ipcRenderer.on('status', (_, text) => {
      statusEl.textContent = text;
    });

    ipcRenderer.on('error', (_, text) => {
      const el = document.getElementById('error');
      el.classList.add('show');
      el.textContent = text;
      loadingContainer.style.display = 'none';
    });

    // 模拟成功状态（用于测试）
    // setTimeout(() => {
    //   loadingContainer.style.display = 'none';
    //   statusEl.innerHTML = '<div class="success-icon">✓</div><div class="success-text">启动成功！</div>';
    // }, 3000);
  </script>
</body>
</html>
